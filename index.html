<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Strait Geopolitical & Market Timeline</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-container">
        <h1>Asymmetric Geopolitical Timeline Analysis</h1>
        <p>Cross-referencing strategic military exercises against financial indicators & semiconductor supply chain technologies.</p>
    </div>
</header>

<main id="timeline-app"></main>

<div id="sensor-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: #1e1e24; color: white; padding: 20px; border-radius: 8px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
    <h3 id="modal-title">感測器名稱</h3>
    <p id="modal-desc">這裡放該感測器的詳細技術規格與介紹...</p>
    <button onclick="closeModal()" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">關閉</button>
</div>

<div id="modal-overlay" onclick="closeModal()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index: 999;"></div>

<footer>
    <p>Data dynamically processed via Vercel Serverless Python Engine.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
